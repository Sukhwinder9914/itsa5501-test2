apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-app
  namespace: exam-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exam-app
  template:
    metadata:
      labels:
        app: exam-app
    spec:
      containers:
        - name: lighttpd-container
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "1Gi"
          volumeMounts:
            - name: shared-volume
              mountPath: /var/www/localhost/htdocs

        - name: logger-container
          image: busybox
          command: ["sh", "-c", "while true; do echo logging; sleep 5; done"]
          volumeMounts:
            - name: shared-volume
              mountPath: /logs

      volumes:
        - name: shared-volume
          persistentVolumeClaim:
            claimName: exam-shared-pvc